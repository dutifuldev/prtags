name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          check-latest: true

      - name: Check SimpleDoc conventions
        run: npx --yes @simpledoc/simpledoc@0.1.6 check

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: check

      - name: Detect Go files
        id: go-files
        run: |
          if find . -type f -name '*.go' -not -path './vendor/*' | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check formatting
        if: steps.go-files.outputs.present == 'true'
        run: |
          unformatted="$(find . -type f -name '*.go' -not -path './vendor/*' | xargs gofmt -l)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        if: steps.go-files.outputs.present == 'true'
        run: go vet ./...

      - name: Run tests
        if: steps.go-files.outputs.present == 'true'
        run: go test ./...

      - name: Check coverage floor
        if: steps.go-files.outputs.present == 'true'
        run: ./scripts/check-go-coverage.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          args: --timeout=5m

      - name: Build release artifacts in snapshot mode
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --snapshot --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
